# Local development infrastructure — Redis only.
# Use this when running `npm run dev` to provide the Redis instance that SentinAI requires.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   npm run dev
#
# Stop:
#   docker compose -f docker-compose.dev.yml down

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_dev_data:
